<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InkFlow Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 30% 10%, #1a232f 0%, #0e141b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .box {
      width: 100%;
      max-width: 360px;
      background: rgba(18, 26, 34, 0.9);
      backdrop-filter: blur(12px);
      padding: 30px 24px;
      border-radius: 28px;
      border: 1px solid rgba(197,160,89,0.2);
    }
    h2 { color: #c5a059; text-align: center; margin-bottom: 24px; }
    input {
      width: 100%; padding: 14px 16px; background: #0f1a24;
      border: 1.5px solid #293e52; border-radius: 18px;
      color: white; margin-bottom: 18px; outline: none;
    }
    input:focus { border-color: #c5a059; }
    .input-wrapper { position: relative; }
    .password-toggle {
      position: absolute; right: 12px; top: 16px;
      background: none; border: none; color: #aaa; font-size: 20px; cursor: pointer;
    }
    .login-btn {
      width: 100%; padding: 14px; background: linear-gradient(145deg, #1d4663 0%, #2b6c9e 100%);
      border: none; border-radius: 40px; color: white; font-weight: 600; cursor: pointer;
    }
    .forgot-btn { background: transparent; color: #aaa; text-decoration: underline; margin-top: 8px; width: 100%; }
    #msg { text-align: center; min-height: 24px; margin-top: 16px; color: #f5a3a3; }
    .signup-link { text-align: center; margin-top: 20px; color: #aaa; }
    .signup-link a { color: #c5a059; text-decoration: none; font-weight: 600; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.8s linear infinite; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
</head>
<body>

<div class="box">
  <h2>InkFlow Login</h2>

  <input type="email" id="email" placeholder="Email address" autocomplete="email" spellcheck="false">

  <div class="input-wrapper">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    <button type="button" class="password-toggle" id="togglePassword">👁️</button>
  </div>

  <button class="login-btn" id="loginBtn"><span id="loginText">Login</span></button>
  <button class="forgot-btn" id="forgotBtn">Forgot Password?</button>
  <p id="msg"></p>
  <div class="signup-link">Don't have an account? <a href="signup.html">Sign up</a></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ========== MASTER SWITCH ==========
  const ENFORCE_PAYMENT = false; // Change to true when ready to charge
  // ==================================

  const firebaseConfig = {
    apiKey: "AIzaSyAtzW6DFuLB_7cz8Q7RqMtR9kaijEGhI3k",
    authDomain: "inkflow-534f6.firebaseapp.com",
    projectId: "inkflow-534f6"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('loginBtn');
  const loginText = document.getElementById('loginText');
  const forgotBtn = document.getElementById('forgotBtn');
  const msg = document.getElementById('msg');
  const toggleBtn = document.getElementById('togglePassword');

  toggleBtn.addEventListener('click', () => {
    const type = passwordInput.type === 'password' ? 'text' : 'password';
    passwordInput.type = type;
    toggleBtn.textContent = type === 'password' ? '👁️' : '🙈';
  });

  async function handleLogin() {
    // Small delay for autofill
    await new Promise(resolve => setTimeout(resolve, 100));

    const email = emailInput.value.trim();
    const password = passwordInput.value;

    if (!email || !password) {
      msg.innerText = "Please enter email and password";
      return;
    }

    loginBtn.disabled = true;
    loginText.innerHTML = '<span class="spinner"></span> Logging in...';
    msg.innerText = '';

    try {
      const userCred = await signInWithEmailAndPassword(auth, email, password);
      const uid = userCred.user.uid;
      
      // Read artist document
      const artistRef = doc(db, 'artists', uid);
      const artistSnap = await getDoc(artistRef);

      if (!artistSnap.exists()) {
        msg.innerText = "Account setup incomplete. Please sign up again.";
        loginBtn.disabled = false;
        loginText.innerText = 'Login';
        return;
      }

      const artistData = artistSnap.data();

      // === PAYMENT GATE (only if ENFORCE_PAYMENT is true) ===
      if (ENFORCE_PAYMENT) {
        const now = new Date();
        
        if (!artistData.status) artistData.status = 'trial';
        if (!artistData.trialEndsAt) artistData.trialEndsAt = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000);
        
        if (artistData.status === 'trial' && artistData.trialEndsAt.toDate() < now) {
          location.href = "payment.html";
          return;
        }
        
        if (artistData.status === 'active' && artistData.plan && artistData.plan !== 'lifetime') {
          if (!artistData.subscriptionEndsAt) {
            location.href = "payment.html";
            return;
          }
          if (artistData.subscriptionEndsAt.toDate() < now) {
            try { await updateDoc(artistRef, { status: 'expired' }); } catch (e) {}
            location.href = "payment.html";
            return;
          }
        }
        
        if (artistData.status === 'expired') {
          location.href = "payment.html";
          return;
        }
      }

      location.href = "dashboard.html";
    } catch (error) {
      console.error('Login error:', error);
      if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
        msg.innerText = "Incorrect email or password";
      } else if (error.code === 'auth/invalid-email') {
        msg.innerText = "Invalid email address";
      } else {
        msg.innerText = "Login failed. Please try again.";
      }
      loginBtn.disabled = false;
      loginText.innerText = 'Login';
    }
  }

  async function handleReset() {
    const email = emailInput.value.trim();
    if (!email) {
      msg.innerText = "Enter your email to reset password";
      return;
    }
    try {
      await sendPasswordResetEmail(auth, email);
      msg.innerText = "Reset email sent! Check your inbox.";
      msg.style.color = '#7ccf7c';
    } catch (error) {
      msg.innerText = "Error sending reset email.";
      msg.style.color = '#f5a3a3';
    }
  }

  loginBtn.addEventListener('click', handleLogin);
  forgotBtn.addEventListener('click', handleReset);
  passwordInput.addEventListener('keypress', e => { if (e.key === 'Enter') handleLogin(); });
  emailInput.addEventListener('keypress', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
